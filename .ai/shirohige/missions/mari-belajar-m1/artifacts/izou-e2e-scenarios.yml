mission: mari-belajar-m1
commander: izou
date: 2026-06-26
framework: vitest + @testing-library/react + jsdom
test_file: src/test/e2e/mari-belajar-m1.e2e.test.tsx

scenarios:
  - id: M1-E2E-01
    title: Landing → Course List → Chapter 1
    business_flow: Flow 1 (Landing → Browse Course → Buka Bab)
    acceptance_criteria:
      - AC-01
      - AC-02
      - AC-03
    steps:
      - Render the application at the homepage (/).
      - Assert the landing heading "Mari Belajar Ilmu Komputer" is visible.
      - Click the "Mulai Belajar" CTA to navigate to /courses.
      - Assert the course list page shows "Daftar Course" and the course "Computer Science / Informatics Fundamentals".
      - Click "Mulai Belajar" on the course card to open chapter 1.
      - Assert the lesson page for "Cara Kerja Komputer — Dari Bit sampai Program Berjalan" renders.
      - Assert the lesson contains the "Dari Listrik ke Bit" and "Bit dan Byte" sections and the "Periksa Jawaban" quiz button.
    expected_result: User can land, browse courses, and open chapter 1 content without errors.
    actual_result: PASS (4 assertions, all green)

  - id: M1-E2E-02
    title: Perfect Quiz Unlocks Next Chapter
    business_flow: Flow 3 (Mengerjakan Quiz → Unlock Chapter Berikutnya)
    acceptance_criteria:
      - AC-04
      - AC-05
    steps:
      - Render the application directly at /courses/cs-fundamentals/ch-01-how-computers-work.
      - Answer all 8 quiz questions with the correct option indices [1, 2, 1, 1, 0, 2, 0, 1].
      - Click "Periksa Jawaban".
      - Assert the success alert "Selamat, semua benar!" and message "Bab berikutnya telah terbuka." are visible.
      - Navigate back to the course detail page.
      - Assert chapter 2 "Sistem Bilangan dan Operasi Bit" is no longer locked and shows "Buka Bab".
    expected_result: 100% quiz score marks chapter 1 complete and unlocks chapter 2.
    actual_result: PASS (6 assertions, all green)

  - id: M1-E2E-03
    title: Incomplete Quiz Shows Retry and Keeps Next Chapter Locked
    business_flow: Flow 3 (Retry path)
    acceptance_criteria:
      - AC-04
      - AC-05
    steps:
      - Render the application directly at /courses/cs-fundamentals/ch-01-how-computers-work.
      - Answer 7 questions correctly and 1 question incorrectly (indices [0, 2, 1, 1, 0, 2, 0, 1]).
      - Click "Periksa Jawaban".
      - Assert the retry alert "Belum sempurna" and message "Pelajari penjelasan di atas dan coba lagi." are visible.
      - Assert the "Ulangi Quiz" button is visible.
      - Navigate back to the course detail page.
      - Assert chapter 2 "Sistem Bilangan dan Operasi Bit" still shows "Terkunci".
    expected_result: Score < 100% keeps the next chapter locked and offers a retry.
    actual_result: PASS (5 assertions, all green)

  - id: M1-E2E-04
    title: Direct Deep Link to Lesson Route
    business_flow: Flow 1 / Cloudflare Pages SPA redirect
    acceptance_criteria:
      - AC-03
      - AC-06
    steps:
      - Render the application with initial route /courses/cs-fundamentals/ch-01-how-computers-work.
      - Assert the lesson heading renders.
      - Assert the lesson contains the Basic section, JavaScript example, TypeScript example, and Go example.
      - Assert the quiz "Periksa Jawaban" button is present.
    expected_result: Deep-linking into a chapter works; equivalent to Cloudflare Pages _redirects serving index.html for any path.
    actual_result: PASS (5 assertions, all green)

notes:
  - Tests use MemoryRouter to exercise the same route configuration as the production BrowserRouter.
  - localStorage and the Zustand progress store are reset before each scenario to guarantee isolated state.
  - Browser-level navigation and Cloudflare _redirects behavior were verified manually on the dist/ output.
